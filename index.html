<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="headerTitle" class="header">Student Result Site</header>

    <form action="" id="studentMarkForm">
        <!-- Name -->
        <label for="studentForm" id="studentNameLabel">
            Student Name
        </label>
        <input id="studentNameText" class="studentForm" type="text" pattern="^[a-zA-Z\s]+$" title="Please enter letters only" required>

        <br>

        <!-- Mark -->
        <label for="studentForm" id="studentMarkLabel">
            Student Mark
        </label>
        <input id="studentMarkText" class="studentForm" type="number" min="0" max="100" required>

        <br>

        <!-- Submit button -->
        <input id="submitBtn" type="button" onclick="alert('Hello World!')" value="Submit">
    </form>

    <!-- Display section for student's result -->
    <div id="studentResultSection">
        <p>Passed</p>
    </div>

    <!-- Display section for list of each displayed student -->
    <div id="studentsListSection">
        <ul id="studentsList">
            <li>name - mark</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
